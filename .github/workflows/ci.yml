on:
  pull_request: {}
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
      - '!v*-pr.*'

name: CI

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v3

      - name: Cache rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check that Cargo.lock is up-to-date
        run: cargo metadata --format-version 1 --locked

      - name: Run cargo fmt
        run: cargo fmt --check

      - name: Run cargo clippy
        run: cargo clippy -- -D warnings

      - name: Run cargo check
        run: cargo check

  test:
    strategy:
      matrix:
        runner: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v3

      - name: Cache rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run cargo test
        run: cargo test

  versions:
    runs-on: ubuntu-latest
    steps:
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack,cargo-minimal-versions

      - name: Checkout sources
        uses: actions/checkout@v3

      - name: Cache rust dependencies
        uses: Swatinem/rust-cache@v2

      # Check with minimal dependency versions and MSRV from Cargo.toml
      - name: Check minimal versions
        run: cargo minimal-versions check --rust-version --features vendored-openssl,vendored-libgit2

  semver:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v3

      - name: Check semver
        uses: obi1kenobi/cargo-semver-checks-action@v2

  flake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v3

      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@v12

      - name: Cache nix dependencies
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Build
        run: nix flake check

  update-release-draft:
    runs-on: ubuntu-latest
    if: github.repository == 'coralogix/protofetch' && github.ref == 'refs/heads/master'
    steps:
      - uses: release-drafter/release-drafter@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package:
    needs: [ lint, test, versions, semver ]
    strategy:
      fail-fast: false
      matrix:
        target:
          - rust: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            tar: tar
            cross: true
            ext: ''
          - rust: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            tar: tar
            cross: true
            ext: ''
          - rust: aarch64-apple-darwin
            runner: macos-14
            # We use gtar to make sure compressed files are not detected as sparse
            tar: gtar
            cross: false
            ext: ''
          - rust: x86_64-apple-darwin
            runner: macos-15-intel
            # We use gtar to make sure compressed files are not detected as sparse
            tar: gtar
            cross: false
            ext: ''
          - rust: x86_64-pc-windows-msvc
            runner: windows-latest
            tar: tar
            cross: false
            ext: '.exe'
    runs-on: ${{ matrix.target.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Cache rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target.rust }}

      - name: Install cross
        if: ${{ matrix.target.cross }}
        run: cargo install --locked cross

      - name: Build
        run: ${{ matrix.target.cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target.rust }} --features vendored-openssl,vendored-libgit2

      - name: Package
        run: |
          mv target/${{ matrix.target.rust }}/release bin/
          ${{ matrix.target.tar }} -czvf protofetch_${{ matrix.target.rust }}.tar.gz bin/protofetch${{ matrix.target.ext }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.target.rust }}
          path: protofetch_${{ matrix.target.rust }}.tar.gz

  test-npm-package:
    needs: [ package ]
    strategy:
      fail-fast: false
      matrix:
        os:
          - runner: ubuntu-latest
            platform: x86_64-unknown-linux-musl
          - runner: macos-14
            platform: aarch64-apple-darwin
          - runner: macos-15-intel
            platform: x86_64-apple-darwin
          - runner: windows-latest
            platform: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-${{ matrix.os.platform }}
          path: artifacts

      - name: Setup test environment
        shell: bash
        run: |
          # Prepare test package with test version
          node .github/npm/prepare-package.js --package coralogix-protofetch --version 0.0.0-test

      - name: Start HTTP server
        uses: Eun/http-server-action@v1
        with:
          port: 8000
          directory: artifacts

      - name: Test npm installation
        shell: bash
        run: |
          cd .github/npm/dist/coralogix-protofetch

          # Install dependencies
          npm install --ignore-scripts

          # Run installation script with custom URL pointing to local HTTP server
          node scripts.js install --url=http://localhost:8000/protofetch_${{ matrix.os.platform }}.tar.gz

          # Verify binary was extracted and works
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./bin/protofetch.exe --version
          else
            ./bin/protofetch --version
          fi

          # Clean up
          rm -rf node_modules package-lock.json bin/

      - name: Test pnpm installation
        shell: bash
        run: |
          cd .github/npm/dist/coralogix-protofetch

          # Install dependencies
          pnpm install --ignore-scripts

          # Run installation script with custom URL pointing to local HTTP server
          node scripts.js install --url=http://localhost:8000/protofetch_${{ matrix.os.platform }}.tar.gz

          # Verify binary was extracted and works
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./bin/protofetch.exe --version
          else
            ./bin/protofetch --version
          fi

  preview-release:
    name: Preview Release
    if: >-
      github.repository == 'coralogix/protofetch' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: [ package, test-npm-package ]
    runs-on: ubuntu-latest
    concurrency:
      group: preview-release-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Compute preview version
        id: version
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          SHORT_SHA="${HEAD_SHA:0:7}"
          VERSION="0.0.0-pr.${PR_NUMBER}.${SHORT_SHA}"
          TAG="v${VERSION}"
          {
            echo "version=${VERSION}"
            echo "tag=${TAG}"
            echo "short_sha=${SHORT_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Download platform artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: package-*
          merge-multiple: true

      - name: Prepare @coralogix/protofetch with preview version
        run: |
          node .github/npm/prepare-package.js \
            --package coralogix-protofetch \
            --version ${{ steps.version.outputs.version }}

      - name: Pack @coralogix/protofetch
        id: pack
        working-directory: .github/npm/dist/coralogix-protofetch
        run: |
          TARBALL=$(npm pack --json | jq -r '.[0].filename')
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          echo "tarball_path=$(pwd)/${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Delete prior preview releases for this PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Query tags by prefix server-side (no 200-cap pagination concern).
          # Trailing dot disambiguates PR #1 from PR #12, etc.
          gh api "repos/${GH_REPO}/git/matching-refs/tags/v0.0.0-pr.${PR_NUMBER}." \
            --jq '.[].ref' 2>/dev/null \
            | sed 's|^refs/tags/||' \
            | while read -r tag; do
                [ -z "$tag" ] && continue
                echo "Deleting prior preview release ${tag}"
                gh release delete "${tag}" --yes --cleanup-tag --repo "${GH_REPO}" || true
              done

      - name: Create preview release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          TARBALL_PATH: ${{ steps.pack.outputs.tarball_path }}
        run: |
          gh release create "$TAG" \
            --title "PR #$PR_NUMBER preview ($SHORT_SHA)" \
            --notes "Preview build for PR #$PR_NUMBER (commit \`$SHORT_SHA\`). This release is automatically deleted when the PR is closed." \
            --prerelease \
            --target "$HEAD_SHA" \
            artifacts/*.tar.gz \
            "$TARBALL_PATH"

      - name: Post or update PR comment
        uses: actions/github-script@v9
        env:
          TAG: ${{ steps.version.outputs.tag }}
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        with:
          script: |
            const marker = '<!-- protofetch-preview-release -->';
            const tag = process.env.TAG;
            const shortSha = process.env.SHORT_SHA;
            const tarball = process.env.TARBALL;
            const installUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}/${tarball}`;
            const releaseUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`;

            const body = [
              marker,
              '## 📦 Preview release available',
              '',
              `A preview build of \`@coralogix/protofetch\` has been published for commit \`${shortSha}\`.`,
              '',
              '### Install',
              '',
              '```bash',
              `npm install ${installUrl}`,
              '```',
              '',
              `### Details`,
              '',
              `- **Release:** [${tag}](${releaseUrl})`,
              `- **Tarball:** ${installUrl}`,
              '',
              `_This preview is automatically deleted when the PR is closed._`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`✓ Updated existing comment #${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('✓ Created new preview comment');
            }

  release:
    if: github.repository == 'coralogix/protofetch' && startsWith(github.ref, 'refs/tags/')
    needs: [ package, test-npm-package ]
    uses: ./.github/workflows/release.yml
    secrets: inherit
