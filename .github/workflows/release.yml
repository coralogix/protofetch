on:
  workflow_call:

name: Release

# OIDC trusted publishing for npm requires `id-token: write` at the workflow
# level here AND at the workflow level of the caller (ci.yml). Per
# https://docs.npmjs.com/trusted-publishers : "The id-token: write permission
# must also be given to both parent and child workflows."
#
# NPM-SIDE NOTE: because this workflow is invoked via `workflow_call`, npm's
# trusted publisher entries on npmjs.com must list the CALLING workflow's
# filename (ci.yml), NOT this file (release.yml). npm validates the OIDC
# token's `workflow_ref` claim, which points at the entry-point workflow.
# Every published package needs its own trusted-publisher entry referencing
# ci.yml: the main package, the cx-protofetch mirror, AND each of the five
# @coralogix/protofetch-<platform> packages. If you rename ci.yml or add a
# platform, update/create the matching entries or publish fails with ENEEDAUTH.
permissions:
  id-token: write
  contents: read

env:
  CARGO_TERM_COLOR: always

# ============================================================================
# Release pipeline structure
# ----------------------------------------------------------------------------
# Stage 1 — Dry-runs (run in parallel, none can be skipped):
#     cargo-dry-run, npm-platform-dry-run (matrix x5),
#     npm-coralogix-protofetch-dry-run, npm-cx-protofetch-dry-run
#
# Stage 2 — github (needs all dry-runs; acts as the convergence point):
#     Creates the GitHub Release with platform binaries. If any dry-run
#     failed, github is skipped and nothing downstream runs.
#
# Stage 3 — Real publishes (all need github):
#     cargo (needs github)
#     npm-platform-publish (matrix x5, needs github) — MUST land before the
#       entry packages so their optionalDependencies resolve.
#     npm-coralogix-protofetch, npm-cx-protofetch (need github AND
#       npm-platform-publish).
#
# Why this ordering: the entry packages declare optionalDependencies on the
# exact-versioned platform packages. If the entry package were published first,
# a user installing during the window between publishes would fail to resolve
# the platform binary. Gating the entry publishes on npm-platform-publish makes
# the platform packages live first. We also keep the original github-release
# convergence gate so a failed dry-run of ANY target stops the whole release,
# preventing the partial-publish states we hit on v0.1.16/v0.1.17.
#
# Caveat: `npm publish --dry-run` does a read-only registry check (e.g. it will
# flag a version that already exists) but never authenticates or uploads, so it
# won't catch OIDC/auth misconfig or a missing platform publish. It catches
# packaging errors, malformed package.json, and node-version issues. `cargo
# publish --dry-run` is offline.
#
# Adding a platform? Add its rust target to the matrices in BOTH
# npm-platform-dry-run and npm-platform-publish, to the PLATFORMS table in
# .github/npm/prepare-package.js and src/run.js, and create its npmjs.com
# trusted-publisher entry.
# ============================================================================

jobs:
  # -------- Stage 1: dry-runs --------

  cargo-dry-run:
    name: cargo (dry-run)
    runs-on: ubuntu-latest
    if: github.repository == 'coralogix/protofetch'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo publish --dry-run
        run: cargo publish --dry-run

  npm-platform-dry-run:
    name: npm-platform (dry-run)
    runs-on: ubuntu-latest
    if: github.repository == 'coralogix/protofetch'
    strategy:
      fail-fast: false
      matrix:
        # `node` is the npm platform suffix for the rust target (see the
        # PLATFORMS table in .github/npm/prepare-package.js).
        target:
          - { rust: aarch64-apple-darwin, node: darwin-arm64 }
          - { rust: x86_64-apple-darwin, node: darwin-x64 }
          - { rust: aarch64-unknown-linux-musl, node: linux-arm64 }
          - { rust: x86_64-unknown-linux-musl, node: linux-x64 }
          - { rust: x86_64-pc-windows-msvc, node: win32-x64 }
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: package-${{ matrix.target.rust }}
          path: artifacts

      - name: Dry-run publish (platform package)
        run: |
          node .github/npm/prepare-package.js --target platform --rust ${{ matrix.target.rust }} --artifacts artifacts
          npm publish --dry-run ".github/npm/dist/platform/coralogix-protofetch-${{ matrix.target.node }}"

  npm-coralogix-protofetch-dry-run:
    name: npm-coralogix-protofetch (dry-run)
    runs-on: ubuntu-latest
    if: github.repository == 'coralogix/protofetch'
    # id-token: write is included so that `npm publish --dry-run` runs under
    # the same identity as the real publish. Even though dry-run doesn't
    # contact the registry, keeping the env consistent avoids "works in
    # dry-run, fails in real" surprises.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Node >= 22.14 is required for npm >= 11.5.1, which is the minimum
      # for OIDC trusted publishing auto-detection on npm CLI.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Dry-run publish (@coralogix/protofetch)
        run: |
          node .github/npm/prepare-package.js --target main
          npm publish --dry-run .github/npm/dist/coralogix-protofetch

  npm-cx-protofetch-dry-run:
    name: npm-cx-protofetch (dry-run)
    runs-on: ubuntu-latest
    if: github.repository == 'coralogix/protofetch'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Node >= 22.14 is required for npm >= 11.5.1, which is the minimum
      # for OIDC trusted publishing auto-detection on npm CLI.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Dry-run publish (cx-protofetch)
        run: |
          node .github/npm/prepare-package.js --target cx
          npm publish --dry-run .github/npm/dist/cx-protofetch

  # -------- Stage 2: github release (convergence point) --------
  # Needs every dry-run. Every Stage 3 real publish needs this job, so a
  # failed dry-run skips github, which in turn skips everything downstream.
  # Adding a new publish target? Add its dry-run to Stage 1 AND to this
  # job's `needs:` list.

  github:
    needs: [ cargo-dry-run, npm-platform-dry-run, npm-coralogix-protofetch-dry-run, npm-cx-protofetch-dry-run ]
    runs-on: ubuntu-latest
    if: github.repository == 'coralogix/protofetch'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: package-*
          merge-multiple: true

      # The tarballs stay on the GitHub Release for direct downloaders and
      # `cargo install`-from-source users. npm consumers no longer fetch them
      # (the binary now ships inside the platform npm packages).
      - name: Upload release artifacts
        uses: softprops/action-gh-release@v3
        with:
          files: |
            protofetch_aarch64-unknown-linux-musl.tar.gz
            protofetch_x86_64-unknown-linux-musl.tar.gz
            protofetch_aarch64-apple-darwin.tar.gz
            protofetch_x86_64-apple-darwin.tar.gz
            protofetch_x86_64-pc-windows-msvc.tar.gz

  # -------- Stage 3: real publishes (all gated on github) --------

  cargo:
    # Cargo doesn't technically need anything from the github release, but we
    # gate on it anyway: if the github release fails, we don't want the crate
    # on crates.io without a matching release tag/assets — that's the exact
    # partial-publish state we're trying to prevent.
    needs: [ github ]
    runs-on: ubuntu-latest
    if: github.repository == 'coralogix/protofetch'
    env:
      CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Publish cargo package
        run: cargo publish --token ${{ env.CRATES_IO_TOKEN }}

  npm-platform-publish:
    # Publishes the per-platform binary packages. These MUST be live before the
    # entry packages (npm-coralogix-protofetch / npm-cx-protofetch) so their
    # optionalDependencies resolve for anyone installing immediately.
    needs: [ github ]
    runs-on: ubuntu-latest
    if: github.repository == 'coralogix/protofetch'
    strategy:
      fail-fast: false
      matrix:
        # `node` is the npm platform suffix for the rust target (see the
        # PLATFORMS table in .github/npm/prepare-package.js).
        target:
          - { rust: aarch64-apple-darwin, node: darwin-arm64 }
          - { rust: x86_64-apple-darwin, node: darwin-x64 }
          - { rust: aarch64-unknown-linux-musl, node: linux-arm64 }
          - { rust: x86_64-unknown-linux-musl, node: linux-x64 }
          - { rust: x86_64-pc-windows-msvc, node: win32-x64 }
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: package-${{ matrix.target.rust }}
          path: artifacts

      - name: Publish platform package
        run: |
          node .github/npm/prepare-package.js --target platform --rust ${{ matrix.target.rust }} --artifacts artifacts
          npm publish ".github/npm/dist/platform/coralogix-protofetch-${{ matrix.target.node }}"

  npm-coralogix-protofetch:
    # github: the release/tag must exist first. npm-platform-publish: the
    # platform packages this one's optionalDependencies point at must be live.
    needs: [ github, npm-platform-publish ]
    runs-on: ubuntu-latest
    if: github.repository == 'coralogix/protofetch'
    # Belt-and-suspenders: job-level id-token: write is technically redundant
    # given the workflow-level grant above, but keeping it makes the OIDC
    # requirement obvious at the job that actually uses it.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Node >= 22.14 is required for npm >= 11.5.1, which is the minimum
      # for OIDC trusted publishing auto-detection on npm CLI.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Publish npm package (@coralogix/protofetch)
        run: |
          node .github/npm/prepare-package.js --target main
          npm publish .github/npm/dist/coralogix-protofetch

  npm-cx-protofetch:
    needs: [ github, npm-platform-publish ]
    runs-on: ubuntu-latest
    if: github.repository == 'coralogix/protofetch'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Node >= 22.14 is required for npm >= 11.5.1, which is the minimum
      # for OIDC trusted publishing auto-detection on npm CLI.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Publish npm package (cx-protofetch)
        run: |
          node .github/npm/prepare-package.js --target cx
          npm publish .github/npm/dist/cx-protofetch
